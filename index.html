const RACE_DATE = new Date('2027-05-22T08:00:00');
const START_DATE = new Date('2026-06-23T00:00:00'); // primo lunedì utile
const TOTAL_WEEKS = 48;
const BLOCKS = [{
  id: 'base',
  label: 'Base',
  weeks: 14,
  color: '#7A8B7F'
}, {
  id: 'costruzione',
  label: 'Costruzione',
  weeks: 20,
  color: '#C97D4A'
}, {
  id: 'specifico',
  label: 'Specifico',
  weeks: 12,
  color: '#A8453A'
}, {
  id: 'taper',
  label: 'Taper',
  weeks: 2,
  color: '#3D5A6C'
}];
function getBlockForWeek(weekNum) {
  let acc = 0;
  for (const b of BLOCKS) {
    if (weekNum <= acc + b.weeks) return {
      ...b,
      weekInBlock: weekNum - acc
    };
    acc += b.weeks;
  }
  return {
    ...BLOCKS[BLOCKS.length - 1],
    weekInBlock: BLOCKS[BLOCKS.length - 1].weeks

}

  const d = new Date(START_DATE);

// ============================================================
// GENERAZIONE SESSIONI SETTIMANALI (motore a blocchi)
// ============================================================
// Volume di corsa target per settimana (km), progressivo dentro ogni blocco,
// con scarico ogni 4a settimana. Adattato dinamicamente dal "livello" corrente.
function baseWeeklyKm(weekNum, level) {
  const block = getBlockForWeek(weekNum);
  const isRecovery = block.weekInBlock % 4 === 0;

  // curve di base per blocco (km settimanali di corsa, non contando MT/forza).
  // Punto di partenza alzato rispetto a un principiante: corri già 20-30km/sett
  // comodamente sotto i 5:00/km, quindi il Base parte da un volume coerente
  // con quello che fai ora, non da un passo indietro.
  const ranges = {
    base: [32, 45],
    costruzione: [45, 62],
    specifico: [58, 88],
    taper: [80, 32]
  };
  const [from, to] = ranges[block.id];
  const t = block.id === 'taper' ? block.weekInBlock / BLOCKS.find(b => b.id === 'taper').weeks : (block.weekInBlock - 1) / Math.max(block.weeks - 1, 1);
  let km = from + (to - from) * t;
  if (isRecovery && block.id !== 'taper') km *= 0.72;

  // livello adattivo: scala il volume in funzione del fattore di aggiustamento
  km = km * level;
  return Math.round(km);
}

// genera le sessioni di corsa per la settimana in base al volume totale.
// Schema giorni fisso, deciso per non sovrapporsi a Muay Thai (lun/mer/ven):
// Mar e Gio = corsa in doppio con la forza (forza resta a pranzo, corsa mattina/sera)
// Sab = lunga, Dom = back-to-back (solo Specifico, settimane piene)
// Dalla 2a metà del Base in poi: sempre 3 sessioni (qualità + medio + lunga).
//
// Nel blocco Specifico la lunga del sabato cresce fino a una vera lunga da ultra
// (50-57km nel picco), non solo una percentuale fissa del totale: nelle settimane
// "piene" il volume infrasettimanale si riduce apposta per spostare il carico sul
// weekend, in linea con come la maggior parte dei piani 100km strutturano il blocco
// specifico (priorità al tempo in piedi nel weekend, non al volume medio settimanale).
function generateRunSessions(weekNum, totalKm, level) {
  const block = getBlockForWeek(weekNum);
  const isRecovery = block.weekInBlock % 4 === 0 && block.id !== 'taper';

    const longRunPct = 0.50;
    const longRun = Math.round(totalKm * longRunPct);
    const remaining = totalKm - longRun;
    sessions.push({
      day: 3,
      type: 'medio',
      label: 'Medio scarico',
      km: Math.round(remaining * 0.5),
      note: 'Ritmo facile, gambe sciolte.' + doppioNote
    });
    sessions.push({
      day: 5,
      type: 'lunga',
      label: block.weekInBlock === 2 ? 'Ultimo allungo leggero' : 'Lunga di scarico',
      km: longRun,
      note: 'Tutto facile, zero ritmo gara.'
    });
  } else if (block.id === 'specifico') {
    const useBackToBack = !isRecovery && block.weekInBlock >= 4;
    let pctLong, pctB2b;
    if (useBackToBack) {
      pctLong = 0.55 + 0.13 * t; // 55% -> 68% del totale va nella sola lunga
      pctB2b = 0.14 + 0.04 * t; // back-to-back cresce 14% -> 18%
    } else {
      pctLong = 0.55 + 0.10 * t;
      pctB2b = 0;
    }
    const restPct = 1 - pctLong - pctB2b;
    const mar = Math.round(totalKm * restPct * 0.45);
    const gio = Math.round(totalKm * restPct * 0.55);
    const longSab = Math.round(totalKm * pctLong);
    const b2bDom = useBackToBack ? Math.round(totalKm * pctB2b) : 0;
    sessions.push({
      day: 1,
      type: 'qualita',
      label: isRecovery ? 'Fondo lento' : 'Salite / cambi ritmo',
      km: mar,
      note: (isRecovery ? 'Solo scarico, FC bassa.' : 'Lavoro su dislivello, simula i tratti tecnici del Passatore.') + doppioNote
    });
    sessions.push({
      day: 3,
      type: 'medio',
      label: 'Fondo medio + zaino',
      km: gio,
      note: 'Porta lo zaino/scarpe gara, prova alimentazione e idratazione.' + doppioNote
    });
    sessions.push({
      day: 5,
      type: 'lunga',
      label: 'Lunga specifica',
      km: longSab,
      note: useBackToBack ? 'Vera lunga da ultra: gestisci cibo, idratazione e ritmo come in gara.' : 'Simula notte/buio se possibile, gestisci cibo e ritmo come in gara.'
    });
    if (b2bDom > 0) {
      sessions.push({
        day: 6,
        type: 'lunga',
        label: 'Back-to-back (gambe stanche)',
        km: b2bDom,
        note: 'Corsa il giorno dopo la lunga, sulle gambe già affaticate: insieme a sabato simulano le ore finali del Passatore.'
      });
    }
  } else if (block.id === 'costruzione') {
    const longRunPct = 0.42 + 0.06 * t;
    const longRun = Math.round(totalKm * longRunPct);
    const remaining = totalKm - longRun;
    sessions.push({
      day: 1,
      type: 'qualita',
      label: isRecovery ? 'Fondo lento' : 'Salite o variazioni di ritmo',
      km: Math.round(remaining * 0.40),
      note: (isRecovery ? 'Scarico attivo.' : 'Inizia a introdurre dislivello, anche moderato.') + doppioNote
    });
    sessions.push({
      day: 3,
      type: 'medio',
      label: 'Fondo medio',
      km: Math.round(remaining * 0.60),
      note: 'Ritmo controllato, costante.' + doppioNote
    });
    sessions.push({
      day: 5,
      type: 'lunga',
      label: 'Lunga progressiva',
      km: longRun,
      note: 'Aumenta gradualmente, ultimi km a ritmo controllato.'
    });
  } else {
    const longRunPct = 0.36 + 0.06 * t;
    const longRun = Math.round(totalKm * longRunPct);
    const remaining = totalKm - longRun;
    sessions.push({
      day: 1,
      type: 'qualita',
      label: isRecovery ? 'Fondo lento' : 'Fondo medio + allunghi',
      km: Math.round(remaining * 0.35),
      note: (isRecovery ? 'Scarico.' : "Introduce un po' di ritmo, niente di duro.") + doppioNote
    });
    sessions.push({
      day: 3,
      type: 'medio',
      label: isRecovery ? 'Fondo lento' : 'Fondo medio',
      km: Math.round(remaining * 0.65),
      note: 'Zona aerobica, costante.' + doppioNote
    });
    sessions.push({
      day: 5,
      type: 'lunga',
      label: 'Lunga base',
      km: longRun,
      note: 'Costanza, niente ritmo. Terreno misto se puoi.'
    });
  }
  return sessions.filter(s => s.km > 0);
}
function generateWeekPlan(weekNum, level) {
  const block = getBlockForWeek(weekNum);
  const totalKm = baseWeeklyKm(weekNum, level);
  const runs = generateRunSessions(weekNum, totalKm, level);
  const start = weekStartDate(weekNum);
  const sessions = [];
  // Muay Thai fissi Lun/Mer/Ven (day 0,2,4 se 0=lunedì)
  [0, 2, 4].forEach(d => sessions.push({
    day: d,
    type: 'muaythai',
    label: 'Muay Thai',
    fixed: true
  }));
  // Forza Mar/Gio
  [1, 3].forEach(d => sessions.push({
    day: d,
    type: 'forza',
    label: 'Forza funzionale (pranzo)',
    fixed: true
  }));
  // Corse generate
  runs.forEach(r => sessions.push(r));
  sessions.sort((a, b) => a.day - b.day);
  sessions.forEach((s, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + s.day);
    s.date = isoDate(d);
    s.id = `w${weekNum}-d${s.day}-${s.type}`;
  });
  return {
    weekNum,
    block: block.id,
    blockLabel: block.label,
    weekInBlock: block.weekInBlock,
    blockTotalWeeks: block.weeks,
    isRecovery: block.weekInBlock % 4 === 0 && block.id !== 'taper',
    totalKm,
    sessions,
    startDate: isoDate(start)

}

// ============================================================
// MOTORE ADATTIVO: calcola il "livello" in base al completamento
// ============================================================
function computeAdaptiveLevel(history, currentWeekNum) {
  // guarda le ultime 4 settimane di sessioni di CORSA pianificate (non MT/forza)
  const lookbackWeeks = 4;
  const fromWeek = Math.max(1, currentWeekNum - lookbackWeeks);
  let planned = 0,
    done = 0;
  for (let w = fromWeek; w < currentWeekNum; w++) {
    const plan = generateWeekPlan(w, history.levelAtWeek?.[w] ?? history.currentLevel ?? 1);
    plan.sessions.filter(s => s.type !== 'muaythai' && s.type !== 'forza').forEach(s => {
      planned++;
      const status = history.log[s.id];
      if (status === 'done') done++;
    });
  }
  if (planned === 0) return {
    level: 1,
    rate: 1,
    status: 'ok',
    weeksConsidered: 0
  };
  const rate = done / planned;
  let level = history.currentLevel ?? 1;
  let status = 'ok';
  if (rate >= 0.85) {
    level = Math.min(1, level + 0.05); // recupera gradualmente verso 1, max 1
    status = 'ok';
  } else if (rate >= 0.6) {
    level = level; // congela progressione (non scende, non sale)
    status = 'frozen';
  } else {
    level = Math.max(0.55, level - 0.12); // regressione di volume
    status = 'reduced';
  }

    level,
    rate,
    status,
    weeksConsidered: currentWeekNum - fromWeek

}

  const deficit = 1 - lvl;
  return Math.round(deficit * 16); // euristica: deficit di livello -> settimane di ritardo equivalenti
}

}
